<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Final Quiz</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; margin: 0; padding: 20px; }
        .container { display: flex; justify-content: center; gap: 20px; margin-top: 30px; flex-wrap: wrap; }
        .img-card { background: #333; padding: 15px; border-radius: 15px; width: 420px; }
        .media-container { width: 400px; height: 400px; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #000; border-radius: 10px; cursor: pointer; border: 4px solid transparent; transition: 0.3s; }
        img, video { max-width: 100%; max-height: 100%; object-fit: contain; }
        #message { font-size: 1.5rem; margin: 20px 0; color: #00d4ff; min-height: 40px; }
        .btn { padding: 15px 30px; font-size: 1.2rem; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; background: #00d4ff; color: #1a1a1a; margin-top: 20px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="quiz-area">
        <h1>Part 2: Final Quiz</h1>
        <p>Current Score: <span id="score">0</span></p>
        <div id="message">Connecting to GitHub...</div>
        <div class="container">
            <div class="img-card"><div class="media-container" id="box0" onclick="checkAnswer(0)"></div></div>
            <div class="img-card"><div class="media-container" id="box1" onclick="checkAnswer(1)"></div></div>
        </div>
        <button id="next-btn" class="btn hidden" onclick="loadRound()">NEXT ROUND</button>
    </div>

    <div id="results-area" class="hidden">
        <h1>Final Results</h1>
        <div style="background: #333; padding: 20px; border-radius: 15px; max-width: 450px; margin: auto;">
            <p>Score <b>Before</b> Training: <span id="old-score" style="color: #ffcc00; font-weight: bold;">0</span></p>
            <p>Score <b>After</b> Training: <span id="new-score" style="color: #00ff00; font-weight: bold;">0</span></p>
            <h2 id="improvement-msg"></h2>
        </div>
        <button class="btn" onclick="window.location.href='prequiz.html'">RESTART COURSE</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA7_nsBL0hBKujwWup8q3wWS9hEID3s5vw",
            authDomain: "digital-tool-kit.firebaseapp.com",
            projectId: "digital-tool-kit",
            storageBucket: "digital-tool-kit.firebasestorage.app",
            messagingSenderId: "540769748987",
            appId: "1:540769748987:web:e1ea37c1b66c46390b6d5e"
        };
        const db = getFirestore(initializeApp(firebaseConfig));

        window.submitData = async (pre, post) => {
            await addDoc(collection(db, "quiz_results"), {
                preScore: pre,
                postScore: post,
                improvement: post - pre,
                time: serverTimestamp()
            });
        };
    </script>

    <script>
        const username = 'Connorepic3456';
        const repo = 'nerdevers';
        let aiFiles = [], realFiles = [], score = 0, aiIndex = 0, canClick = true, isLoaded = false;

        async function fetchFiles() {
            try {
                const [aiRes, realRes] = await Promise.all([
                    fetch(`https://api.github.com/repos/${username}/${repo}/contents/ai`),
                    fetch(`https://api.github.com/repos/${username}/${repo}/contents/real`)
                ]);
                const aiData = await aiRes.json();
                const realData = await realRes.json();
                aiFiles = aiData.map(f => `https://raw.githubusercontent.com/${username}/${repo}/main/${f.path}`);
                realFiles = realData.map(f => `https://raw.githubusercontent.com/${username}/${repo}/main/${f.path}`);
                isLoaded = true;
                loadRound();
            } catch (e) {
                document.getElementById('message').innerText = "Error: Could not reach GitHub.";
            }
        }

        function loadRound() {
            if (!isLoaded) return;
            if (aiFiles.length === 0) {
                const pre = parseInt(localStorage.getItem('preScore')) || 0;
                document.getElementById('quiz-area').classList.add('hidden');
                document.getElementById('results-area').classList.remove('hidden');
                document.getElementById('old-score').innerText = pre;
                document.getElementById('new-score').innerText = score;
                document.getElementById('improvement-msg').innerText = score > pre ? "You Improved! 📈" : "Consistency is key! 🎯";
                window.submitData(pre, score);
                return;
            }
            canClick = true;
            document.getElementById('next-btn').classList.add('hidden');
            document.getElementById('box0').style.borderColor = "transparent";
            document.getElementById('box1').style.borderColor = "transparent";

            const aiIdx = Math.floor(Math.random() * aiFiles.length);
            const chosenAi = aiFiles[aiIdx];
            const isVideo = chosenAi.toLowerCase().endsWith('.mp4');
            const matchingReal = realFiles.filter(path => path.toLowerCase().endsWith('.mp4') === isVideo);

            if (matchingReal.length === 0) {
                aiFiles.splice(aiIdx, 1);
                loadRound();
                return;
            }

            const chosenReal = matchingReal[Math.floor(Math.random() * matchingReal.length)];
            const realIdx = realFiles.indexOf(chosenReal);
            aiFiles.splice(aiIdx, 1);
            realFiles.splice(realIdx, 1);

            aiIndex = Math.random() > 0.5 ? 1 : 0;
            document.getElementById('box' + aiIndex).innerHTML = createMedia(chosenAi);
            document.getElementById('box' + (1 - aiIndex)).innerHTML = createMedia(chosenReal);
            document.getElementById('message').innerText = isVideo ? "Which video is AI?" : "Which picture is AI?";
        }

        function createMedia(path) {
            return path.toLowerCase().endsWith('.mp4') ? `<video src="${path}" autoplay loop muted playsinline></video>` : `<img src="${path}">`;
        }

        function checkAnswer(idx) {
            if (!canClick) return;
            canClick = false;
            document.getElementById('box' + aiIndex).style.borderColor = "#00ff00";
            document.getElementById('box' + (1 - aiIndex)).style.borderColor = "#ff0000";
            if (idx === aiIndex) score++;
            document.getElementById('score').innerText = score;
            document.getElementById('next-btn').classList.remove('hidden');
        }
        fetchFiles();
    </script>
</body>
</html>
