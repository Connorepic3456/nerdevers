<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI or Real? - Multi-Media Edition</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; margin: 0; padding: 20px; }
        .container { display: flex; justify-content: center; gap: 20px; margin-top: 30px; flex-wrap: wrap; }
        .img-card { background: #333; padding: 15px; border-radius: 15px; width: 420px; }
        .media-container { width: 400px; height: 400px; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #000; border-radius: 10px; cursor: pointer; border: 4px solid transparent; transition: 0.3s; }
        .media-container:hover { border-color: #00d4ff; }
        img, video { max-width: 100%; max-height: 100%; object-fit: contain; }
        #message { font-size: 1.5rem; margin: 20px 0; height: 40px; color: #00d4ff; }
        .btn { padding: 15px 30px; font-size: 1.2rem; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; margin-top: 20px; }
        #start-btn { background: #00d4ff; color: #1a1a1a; }
        #next-btn { background: #00d4ff; color: #1a1a1a; }
        #retry-btn { background: #ffcc00; color: #1a1a1a; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <h1>AI or Real?</h1>
    
    <div id="setup">
        <p>Press start to enable sound and begin the game!</p>
        <button id="start-btn" class="btn" onclick="startGame()">START GAME</button>
    </div>

    <div id="game-ui" class="hidden">
        <p>Score: <span id="score">0</span></p>
        <div id="message">Loading files...</div>

        <div class="container">
            <div class="img-card">
                <p>File 1</p>
                <div class="media-container" id="box0" onclick="checkAnswer(0)"></div>
            </div>
            <div class="img-card">
                <p>File 2</p>
                <div class="media-container" id="box1" onclick="checkAnswer(1)"></div>
            </div>
        </div>

        <button id="next-btn" class="btn hidden" onclick="loadRound()">NEXT ROUND</button>
        <button id="retry-btn" class="btn hidden" onclick="resetGame()">TRY AGAIN</button>
    </div>

    <script>
        const username = 'Connorepic3456';
        const repo = 'nerdevers';

        let aiFiles = [];
        let realFiles = [];
        let originalAi = [];
        let originalReal = [];
        let score = 0;
        let aiIndex = 0;
        let canClick = true;

        function startGame() {
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('game-ui').classList.remove('hidden');
            fetchFiles();
        }

        async function fetchFiles() {
            try {
                const aiRes = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/ai`);
                const aiData = await aiRes.json();
                originalAi = aiData.map(file => `https://raw.githubusercontent.com/${username}/${repo}/main/${file.path}`);

                const realRes = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/real`);
                const realData = await realRes.json();
                originalReal = realData.map(file => `https://raw.githubusercontent.com/${username}/${repo}/main/${file.path}`);

                resetGame();
            } catch (err) {
                document.getElementById('message').innerText = "Error loading files!";
            }
        }

        function resetGame() {
            aiFiles = [...originalAi];
            realFiles = [...originalReal];
            score = 0;
            document.getElementById('score').innerText = score;
            document.getElementById('retry-btn').classList.add('hidden');
            loadRound();
        }

        function createMediaElement(path) {
            const isVideo = path.toLowerCase().endsWith('.mp4') || path.toLowerCase().endsWith('.webm');
            if (isVideo) {
                return `<video src="${path}" autoplay loop playsinline></video>`;
            } else {
                return `<img src="${path}">`;
            }
        }

        function loadRound() {
            canClick = true;
            document.getElementById('next-btn').classList.add('hidden');
            document.getElementById('box0').style.borderColor = "transparent";
            document.getElementById('box1').style.borderColor = "transparent";

            if (aiFiles.length === 0 || realFiles.length === 0) {
                document.getElementById('message').innerText = "Game Over! You've seen everything.";
                document.getElementById('box0').innerHTML = "";
                document.getElementById('box1').innerHTML = "";
                document.getElementById('retry-btn').classList.remove('hidden');
                return;
            }

            const aiIdx = Math.floor(Math.random() * aiFiles.length);
            const chosenAi = aiFiles[aiIdx];
            const isVideo = chosenAi.toLowerCase().endsWith('.mp4') || chosenAi.toLowerCase().endsWith('.webm');

            const matchingRealFiles = realFiles.filter(path => {
                const isRealVideo = path.toLowerCase().endsWith('.mp4') || path.toLowerCase().endsWith('.webm');
                return isVideo === isRealVideo;
            });

            if (matchingRealFiles.length === 0) {
                aiFiles.splice(aiIdx, 1);
                loadRound(); 
                return;
            }

            const randomRealFile = matchingRealFiles[Math.floor(Math.random() * matchingRealFiles.length)];
            const realIdx = realFiles.indexOf(randomRealFile);

            aiFiles.splice(aiIdx, 1);
            realFiles.splice(realIdx, 1);

            aiIndex = Math.random() > 0.5 ? 1 : 0;
            document.getElementById('box' + aiIndex).innerHTML = createMediaElement(chosenAi);
            document.getElementById('box' + (1 - aiIndex)).innerHTML = createMediaElement(randomRealFile);
            document.getElementById('message').innerText = isVideo ? "Which video is AI?" : "Which picture is AI?";
        }

        function checkAnswer(clickedIndex) {
            if (!canClick) return;
            canClick = false;

            document.getElementById('next-btn').classList.remove('hidden');
            
            if (clickedIndex === aiIndex) {
                score++;
                document.getElementById('score').innerText = score;
                document.getElementById('message').innerText = "Correct! ✨ Click Next.";
                document.getElementById('box' + clickedIndex).style.borderColor = "#00ff00";
            } else {
                document.getElementById('message').innerText = "Wrong! That was real. ❌ Click Next.";
                document.getElementById('box' + clickedIndex).style.borderColor = "#ff0000";
            }
        }
    </script>
</body>
</html>
