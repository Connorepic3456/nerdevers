<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI or Real? - Multi-Media Edition</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; margin: 0; padding: 20px; }
        .container { display: flex; justify-content: center; gap: 20px; margin-top: 30px; flex-wrap: wrap; }
        .img-card { background: #333; padding: 15px; border-radius: 15px; width: 420px; }
        .media-container { width: 400px; height: 400px; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #000; border-radius: 10px; cursor: pointer; border: 4px solid transparent; transition: 0.3s; }
        .media-container:hover { border-color: #00d4ff; }
        img, video { max-width: 100%; max-height: 100%; object-fit: contain; }
        #message { font-size: 1.5rem; margin: 20px 0; height: 40px; color: #00d4ff; }
        #start-btn { padding: 15px 30px; font-size: 1.2rem; cursor: pointer; background: #00d4ff; border: none; border-radius: 5px; color: #1a1a1a; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <h1>AI or Real?</h1>
    <div id="setup">
        <p>Press start to enable sound and begin the game!</p>
        <button id="start-btn" onclick="startGame()">START GAME</button>
    </div>

    <div id="game-ui" class="hidden">
        <p>Score: <span id="score">0</span></p>
        <div id="message">Loading files...</div>

        <div class="container">
            <div class="img-card">
                <p>File 1</p>
                <div class="media-container" id="box0" onclick="checkAnswer(0)"></div>
            </div>
            <div class="img-card">
                <p>File 2</p>
                <div class="media-container" id="box1" onclick="checkAnswer(1)"></div>
            </div>
        </div>
    </div>

    <script>
        const username = 'Connorepic3456';
        const repo = 'nerdevers';

        let aiFiles = [];
        let realFiles = [];
        let score = 0;
        let aiIndex = 0;

        function startGame() {
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('game-ui').classList.remove('hidden');
            fetchFiles();
        }

        async function fetchFiles() {
            try {
                const aiRes = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/ai`);
                const aiData = await aiRes.json();
                aiFiles = aiData.map(file => file.path);

                const realRes = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/real`);
                const realData = await realRes.json();
                realFiles = realData.map(file => file.path);

                loadRound();
            } catch (err) {
                document.getElementById('message').innerText = "Error loading files! Make sure your folders exist.";
            }
        }

        function createMediaElement(path) {
            const isVideo = path.toLowerCase().endsWith('.mp4') || path.toLowerCase().endsWith('.webm');
            if (isVideo) {
                // Removed 'muted' so you can hear it
                return `<video src="${path}" autoplay loop playsinline></video>`;
            } else {
                return `<img src="${path}">`;
            }
        }

        function loadRound() {
            if (aiFiles.length === 0 || realFiles.length === 0) return;

            const randomAi = aiFiles[Math.floor(Math.random() * aiFiles.length)];
            const randomReal = realFiles[Math.floor(Math.random() * realFiles.length)];

            aiIndex = Math.random() > 0.5 ? 1 : 0;
            
            document.getElementById('box' + aiIndex).innerHTML = createMediaElement(randomAi);
            document.getElementById('box' + (1 - aiIndex)).innerHTML = createMediaElement(randomReal);
            document.getElementById('message').innerText = "Which one is AI?";
        }

        function checkAnswer(clickedIndex) {
            if (clickedIndex === aiIndex) {
                score++;
                document.getElementById('score').innerText = score;
                document.getElementById('message').innerText = "Correct! ✨";
                setTimeout(loadRound, 1500);
            } else {
                document.getElementById('message').innerText = "Wrong! That was real. ❌";
                setTimeout(loadRound, 2000);
            }
        }
    </script>
</body>
</html>
